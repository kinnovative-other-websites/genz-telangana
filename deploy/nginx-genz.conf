# Nginx reverse proxy for the Gen Z Conclave app.
# Put this at: /etc/nginx/sites-available/genz
# Then:  sudo ln -s /etc/nginx/sites-available/genz /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx
#
# After this works on port 80, run certbot (see DEPLOY.md) to add HTTPS — it
# will edit this file automatically to add the 443 server block + redirect.

server {
    listen 80;
    server_name genz.k-innovative.com;

    # Allow larger uploads/responses if ever needed
    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
