name: Deploy to EC2

# Auto-deploys on every push to main. First-time server setup (clone repo, create
# .env, pm2 start) is done manually once — see DEPLOY.md. This workflow handles
# every deploy after that.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allows manual "Run workflow" from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd ${{ secrets.APP_DIR }}
            git pull origin main
            npm install --omit=dev
            pm2 restart gen-z-conclave || pm2 start ecosystem.config.cjs
            pm2 save
